name: Playwright Validation

on:
  repository_dispatch:
    types: [copado_deploy_result]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------
      # Install Node
      # ----------------------------
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 50

      # ----------------------------
      # Install Dependencies added
      # ----------------------------
      - name: Install Dependencies
        run: npm install

      # ----------------------------
      # Install Playwright
      # ----------------------------
      - name: Install Playwright
        run: npx playwright install --with-deps

      # ----------------------------
      # Print Payload From Copado
      # ----------------------------
      - name: Print Copado Payload
        run: |
          echo "Status: ${{ github.event.client_payload.status }}"
          echo "Deployment Status: ${{ github.event.client_payload.deploymentStatus }}"
          echo "Environment: ${{ github.event.client_payload.environment }}"
          echo "Components Deployed: ${{ github.event.client_payload.componentsDeployed }}"

      # ----------------------------
      # Validate Deployment Status
      # ----------------------------
      - name: Validate Deployment
        run: |
          echo "Deployment status received from Copado:"
          echo "${{ github.event.client_payload.deploymentStatus }}"

      # ----------------------------
      # Run Playwright Tests
      # ----------------------------
      - name: Run Playwright Tests
        if: github.event.client_payload.status == 'SUCCESS'
        run: |
          echo "Deployment successful. Running Playwright tests..."
          echo "Environment: ${{ github.event.client_payload.environment }}"
          echo "Components deployed: ${{ github.event.client_payload.componentsDeployed }}"
          npx playwright test

      # ----------------------------
      # Skip Tests if Deployment Failed
      # ----------------------------
      - name: Skip Tests if Deployment Failed
        if: github.event.client_payload.status == 'FAILED'
        run: |
          echo "Deployment failed in Copado."
          echo "Skipping Playwright execution."

      # ----------------------------
      # Send Email Notification
      # ----------------------------
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Copado Deployment Result
          to: abhishek@example.com
          from: CI-CD
          body: |
            Copado Deployment Notification

            Status: ${{ github.event.client_payload.status }}
            Deployment Status: ${{ github.event.client_payload.deploymentStatus }}
            Environment: ${{ github.event.client_payload.environment }}
            Components Deployed: ${{ github.event.client_payload.componentsDeployed }}

            Playwright tests were triggered automatically if deployment succeeded.
